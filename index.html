<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farm Builder</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Farm Builder</h1>

      <section class="toolbar" id="toolbar" aria-label="Object toolbar">
        <span class="toolbar-label">Select object:</span>
        <button class="toolbar-button" data-object-id="tree" type="button">Tree</button>
        <button class="toolbar-button" data-object-id="barn" type="button">Barn</button>
        <button class="toolbar-button" data-object-id="plot" type="button">Plot</button>
      </section>

      <p class="status" id="status">Select an object, then click the farm to place it.</p>

      <section
        class="farm"
        id="farm"
        role="application"
        aria-label="Farm canvas"
      ></section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
