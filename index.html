<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farm Builder</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main id="game-view" class="game-view" aria-label="Farm game view">
      <canvas
        id="farm-background"
        class="background-layer"
        aria-label="Farm ground background"
      ></canvas>
      <section id="audio-settings" class="audio-settings" aria-label="Audio settings">
        <label class="audio-settings__toggle" for="audio-enabled-toggle">
          <input id="audio-enabled-toggle" type="checkbox" />
          <span>Farm audio</span>
        </label>
        <label class="audio-settings__slider-row" for="audio-volume-slider">
          <span>Volume</span>
          <input
            id="audio-volume-slider"
            class="audio-settings__slider"
            type="range"
            min="0"
            max="100"
            step="1"
          />
        </label>
        <p id="audio-status" class="audio-settings__status" aria-live="polite"></p>
      </section>
      <section
        id="placement-layer"
        class="placement-layer"
        aria-label="Placed farm objects"
      ></section>
      <section id="farm-toolbar" class="farm-toolbar" aria-label="Farm object toolbar">
        <div
          id="toolbar-buttons"
          class="farm-toolbar__buttons"
          role="group"
          aria-label="Farm objects"
        ></div>
      </section>
    </main>
    <script type="module" src="./src/game.js"></script>
  </body>
</html>
